<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Barge 3D – Sơn Tàu Biển | Sơn Hải Vân</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./images/logo-shv-bg-white.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #0c1e35;
        --navy-mid: #163354;
        --gold: #b8975a;
        --gold-light: #d4b07a;
        --cream: #f7f5f1;
        --white: #ffffff;
        --text-dark: #1a2b3c;
        --text-mid: #4a6070;
        --text-light: #8599aa;
        --border: rgba(12, 30, 53, 0.12);
        --border-gold: rgba(184, 151, 90, 0.35);
        --panel-bg: rgba(255, 255, 255, 0.97);
        --shadow-sm: 0 2px 12px rgba(12, 30, 53, 0.08);
        --shadow-md: 0 8px 32px rgba(12, 30, 53, 0.14);
        --shadow-lg: 0 20px 60px rgba(12, 30, 53, 0.2);
        --radius: 10px;
        --radius-sm: 6px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
        font-family: "DM Sans", sans-serif;
        background: #e8ecf0;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      /* ── TOOLTIP ────────────────────────── */
      #tooltip {
        position: fixed;
        display: none;
        z-index: 1000;
      }

      /* ── BRAND BAR (bottom) ─────────────── */
      #brand-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 44px;
        background: var(--navy);
        border-top: 2px solid var(--gold);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 9999;
        pointer-events: none;
      }

      #brand-bar img {
        height: 22px;
        opacity: 0.9;
        filter: brightness(1.3);
      }

      #brand-bar .brand-text {
        font-family: "DM Sans", sans-serif;
        font-size: 11.5px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.5px;
      }

      #brand-bar .brand-name {
        color: var(--gold-light);
        font-weight: 600;
      }

      #brand-bar .divider {
        width: 1px;
        height: 14px;
        background: rgba(255, 255, 255, 0.15);
      }

      #brand-bar .brand-tag {
        font-size: 10.5px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        font-weight: 400;
      }

      /* ── HEADER TOP ─────────────────────── */
      #header-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background: var(--navy);
        border-bottom: 1px solid rgba(184, 151, 90, 0.3);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        z-index: 900;
        pointer-events: none;
      }

      #header-bar img {
        height: 26px;
        opacity: 0.95;
      }

      #header-bar .header-sep {
        width: 1px;
        height: 18px;
        background: rgba(255, 255, 255, 0.15);
      }

      #header-bar .header-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.88);
        letter-spacing: 0.3px;
      }

      #header-bar .header-sub {
        font-size: 11px;
        color: var(--gold-light);
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 500;
        margin-left: auto;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="tooltip"></div>

    <!-- Header -->
    <div id="header-bar">
      <img src="./images/logo-shv-bg-white.png" alt="Sơn Hải Vân" />
      <div class="header-sep"></div>
      <div class="header-title">Bản đồ Sơn Tàu Biển — 3D Interactive</div>
      <!-- <div class="header-sub">Marine Coating System</div> -->
    </div>

    <!-- Brand Bar -->
    <div id="brand-bar">
      <!-- <img src="./images/logo-shv-bg-white.png" alt="logo" /> -->
      <div class="brand-text">
        © 2026 &nbsp;<span class="brand-name">Hai Van Paint Co., Ltd.</span>
      </div>
      <div class="divider"></div>
      <!-- <div class="brand-tag">Exclusive 3D Design · All Rights Reserved</div> -->
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="./main.js"></script>
